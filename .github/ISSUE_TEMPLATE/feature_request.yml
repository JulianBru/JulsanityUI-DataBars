name: Feature Request
description: Suggest an idea or improvement for JulsanityUI DataBars
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and this hasn't been requested yet.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your request related to a problem or limitation? Describe it.
      placeholder: I'm always frustrated when ...
    validations:
      required: false
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A clear description of what you'd like to happen.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the addon does this relate to?
      options:
        - "New DataText"
        - "Existing DataText"
        - "Bars / layout"
        - "Appearance / styling"
        - "Configuration UI"
        - "Profiles / import-export"
        - "Other"
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false
